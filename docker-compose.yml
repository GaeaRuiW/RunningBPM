version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: runningbpm-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - uploads:/app/uploads
      - outputs:/app/outputs
    environment:
      - PYTHONUNBUFFERED=1
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-524288000}
      - CLEANUP_INTERVAL_HOURS=${CLEANUP_INTERVAL_HOURS:-1}
      - CLEANUP_MAX_AGE_HOURS=${CLEANUP_MAX_AGE_HOURS:-24}
      - MAX_GLOBAL_TASKS=${MAX_GLOBAL_TASKS:-10}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    networks:
      - runningbpm-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: runningbpm-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - runningbpm-network

networks:
  runningbpm-network:
    driver: bridge

volumes:
  uploads:
  outputs:
