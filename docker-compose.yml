version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: runningbpm-backend
    ports:
      - "8001:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/outputs:/app/outputs
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - runningbpm-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: runningbpm-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - runningbpm-network

networks:
  runningbpm-network:
    driver: bridge

volumes:
  uploads:
  outputs:

